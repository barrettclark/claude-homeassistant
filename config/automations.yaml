- id: '1644196625324'
  alias: Low battery level detection & notification for all battery sensors
  description: Notify when a device has a low battery
  use_blueprint:
    path: gmlupatelli/low_battery_notification.yaml
    input:
      actions:
      - action: notify.mobile_app_barrett_clarks_iphone_17_pro
        data: {}
- id: '2'
  alias: Front Porch Light On at Dusk
  description: Turn on when ambient light drops below 500 lx for 2 minutes
  trigger:
  - trigger: numeric_state
    entity_id: sensor.coppell_illuminance
    below: 500
    for: "00:02:00"
  condition: []
  action:
  - type: turn_on
    device_id: faaf256dc874426f906e15618615f935
    entity_id: light.front_porch_light
    domain: light
  mode: single
- id: '5'
  alias: Front Porch Light Off at Dawn
  description: Turn off when ambient light rises above 1000 lx for 2 minutes
  trigger:
  - trigger: numeric_state
    entity_id: sensor.coppell_illuminance
    above: 1000
    for: "00:02:00"
  condition: []
  action:
  - type: turn_off
    device_id: faaf256dc874426f906e15618615f935
    entity_id: light.front_porch_light
    domain: light
  mode: single
- id: '1644360614482'
  alias: Fireplace Light Auto-On
  description: Turn on fireplace light when front door opens
  triggers:
  - device_id: c77f976f790a48855f3ee334c1318de8
    domain: lock
    entity_id: fc1ef887b5b797adb553a209f537bceb
    type: unlocked
    trigger: device
  conditions:
  - condition: device
    type: is_off
    device_id: b8733330320dd4e275567a6960321228
    entity_id: switch.fireplace
    domain: switch
  - condition:
    - condition: or
      conditions:
      - condition: sun
        after: sunset
        after_offset: -00:15:00
      - condition: sun
        before: sunrise
        before_offset: 00:15:00
  actions:
  - type: turn_on
    device_id: b8733330320dd4e275567a6960321228
    entity_id: switch.fireplace
    domain: switch
  mode: single
- id: '1644414344225'
  alias: Front Porch off at 1am
  description: Turn the front porch light off at 1AM (if it is on)
  trigger:
  - platform: time
